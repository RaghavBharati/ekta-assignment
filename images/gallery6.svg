<svg xmlns="http://www.w3.org/2000/svg" width="700" height="900" viewBox="0 0 700 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.2" fill="rgba(255,255,255,.10)"/>
    </pattern>
  </defs>
  <rect width="700" height="900" fill="url(#g)"/>
  <rect width="700" height="900" fill="url(#dots)"/>
  <text x="50%" y="46%" font-size="225" text-anchor="middle" dominant-baseline="central">💪</text>
  <text x="50%" y="74%" font-size="64" fill="#ffffff" font-family="Poppins,Segoe UI,Arial" font-weight="700" text-anchor="middle" opacity="0.95">Fitness Challenge</text>
</svg>
